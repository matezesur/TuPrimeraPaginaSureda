<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuredaFinanzas</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f6f8;
            color: #222;
        }

        header {
            background-color: #0f172a;
            color: white;
            padding: 20px 40px;
        }

        header h1 {
            margin: 0;
        }

        nav {
            margin-top: 15px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-right: 15px;
            font-size: 15px;
        }

        nav a:hover {
            text-decoration: underline;
        }

        main {
            width: 85%;
            max-width: 1100px;
            margin: 30px auto;
        }

        .card {
            background-color: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .boton {
            display: inline-block;
            background-color: #0f172a;
            color: white;
            padding: 10px 14px;
            border-radius: 6px;
            text-decoration: none;
            border: none;
            cursor: pointer;
        }

        .boton:hover {
            background-color: #1e293b;
        }

        form p {
            margin-bottom: 15px;
        }

        input, textarea, select {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        footer {
            text-align: center;
            color: #666;
            padding: 25px;
        }
    </style>
</head>
<body>
    <header>
        <h1>SuredaFinanzas</h1>
        <p>Educación financiera, inversiones y planificación patrimonial</p>
        <nav>
            <a href="{% url 'inicio' %}">Inicio</a>
            <a href="{% url 'lista_articulos' %}">Artículos</a>
            <a href="{% url 'crear_articulo' %}">Nuevo artículo</a>
            <a href="{% url 'lista_servicios' %}">Servicios</a>
            <a href="{% url 'crear_servicio' %}">Nuevo servicio</a>
            <a href="{% url 'crear_consulta' %}">Nueva consulta</a>
            <a href="{% url 'buscar_articulos' %}">Buscar</a>
        </nav>
    </header>

    <main>
        {% block contenido %}
        {% endblock %}
    </main>

    <footer>
        <p>Proyecto Django - Tercera entrega Python Coderhouse</p>
    </footer>
</body>
</html>
